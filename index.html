<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HappyMusic</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="player">
    <img id="cover" src="https://i.imgur.com/8Km9tLL.jpg" alt="Capa">
    <h1 class="logo">HappyMusic</h1>
    <h2 id="title">Carregando...</h2>
    <p id="artist"></p>

    <audio id="audio" preload="metadata" playsinline></audio>

    <div class="controls">
      <button id="prev">⏮</button>
      <button id="play">▶</button>
      <button id="next">⏭</button>
    </div>

    <p id="status"></p>

    <input type="text" id="search" placeholder="Pesquisar música...">

    <div id="admin-section" style="margin-top: 20px; padding: 10px; border: 1px solid #333; border-radius: 8px;">
        <input type="text" id="new-title" placeholder="Título" style="width: 100%; margin-bottom: 5px;">
        <input type="text" id="new-artist" placeholder="Artista" style="width: 100%; margin-bottom: 5px;">
        <input type="text" id="new-cover" placeholder="URL da Capa" style="width: 100%; margin-bottom: 5px;">
        <input type="text" id="new-url" placeholder="URL do Áudio" style="width: 100%; margin-bottom: 5px;">
        <button id="add-btn" style="width: 100%; height: 40px; cursor: pointer;">Adicionar Música</button>
    </div>

    <ul id="playlist"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
