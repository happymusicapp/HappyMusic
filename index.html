<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>HappyMusic</title>

  <link rel="stylesheet" href="style.css">

</head>
<body>

  <div class="player">

    <img
      id="cover"
      src="https://i.imgur.com/8Km9tLL.jpg"
      alt="Capa"
    >

    <h1 class="logo">
      HappyMusic
    </h1>

    <h2 id="title">
      Carregando...
    </h2>

    <p id="artist"></p>

    <audio
      id="audio"
      controls
      preload="metadata"
      playsinline
    ></audio>

    <div class="controls">

      <button id="prev">
        ⏮
      </button>

      <button id="play">
        ▶
      </button>

      <button id="next">
        ⏭
      </button>

    </div>

    <p id="status"></p>

    <ul id="playlist"></ul>

  </div>

  <script src="app.js"></script>

</body>
</html>
