<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Meu Player</title>

  <link rel="stylesheet"
        href="style.css">

</head>

<body>

  <div class="player">

    <img id="cover"
         src=""
         alt="Capa">

    <h2 id="title">
      Carregando...
    </h2>

    <p id="artist"></p>

    <audio id="audio" controls></audio>

    <div class="controls">

      <button id="prev">
        ⏮
      </button>

      <button id="play">
        ▶
      </button>

      <button id="next">
        ⏭
      </button>

    </div>

    <ul id="playlist"></ul>

  </div>

  <script src="app.js"></script>

</body>
</html>
