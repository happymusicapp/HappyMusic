name: build-android

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  APP_VERSION_NAME: "2.0.0"
  APP_VERSION_CODE: "3"

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    container:
      image: mingc/android-build-box:latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v5

      - name: Instalar dependencias (npm)
        run: |
          set -euxo pipefail
          unset NODE_ENV
          node --version
          npm --version
          npm ci --include=dev

      - name: Gerar bundle do Capacitor e sincronizar com o projeto Android
        run: |
          set -euxo pipefail
          npm run build:native
          npx cap sync android

      - name: Ajustar versionCode / versionName do build
        run: |
          set -euxo pipefail
          sed -i "s/versionCode [0-9]\+/versionCode ${APP_VERSION_CODE}/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${APP_VERSION_NAME}\"/" android/app/build.gradle
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Decodificar keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          set -euxo pipefail
          : "${KEYSTORE_BASE64:?Missing KEYSTORE_BASE64}"
          : "${KEY_ALIAS:?Missing KEY_ALIAS}"
          : "${KEY_PASSWORD:?Missing KEY_PASSWORD}"
          : "${KEYSTORE_PASSWORD:?Missing KEYSTORE_PASSWORD}"
          printf '%s' "$KEYSTORE_BASE64" | tr -d '\r\n\t ' | base64 -d > "$GITHUB_WORKSPACE/happymusic.keystore"
          test -s "$GITHUB_WORKSPACE/happymusic.keystore"
          keytool -list -v -keystore "$GITHUB_WORKSPACE/happymusic.keystore" -alias "$KEY_ALIAS" -storepass "$KEYSTORE_PASSWORD" | grep "SHA256:"

      - name: Build do app Android (APK + AAB assinados via Gradle)
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          set -euxo pipefail
          export HM_KEYSTORE_PATH="$GITHUB_WORKSPACE/happymusic.keystore"
          export HM_KEYSTORE_PASSWORD="$KEYSTORE_PASSWORD"
          export HM_KEY_ALIAS="$KEY_ALIAS"
          export HM_KEY_PASSWORD="$KEY_PASSWORD"

          cd android
          chmod +x ./gradlew
          ./gradlew bundleRelease assembleRelease --no-daemon

          mkdir -p ../output
          AAB="$(find app/build/outputs/bundle/release -name '*.aab' | head -n 1)"
          APK="$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)"
          test -n "$AAB" && cp "$AAB" ../output/HappyMusic.aab
          test -n "$APK" && cp "$APK" ../output/HappyMusic.apk
          ls -la ../output

      - name: Disponibilizar APK e AAB para download
        uses: actions/upload-artifact@v5
        with:
          name: happymusic-android-v${{ env.APP_VERSION_NAME }}
          path: output/
          retention-days: 30
